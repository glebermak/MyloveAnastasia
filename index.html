<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Красивые сердца</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(to bottom right, #ffe6f0, #f2d9e6);
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="heartCanvas"></canvas>

  <script>
    const canvas = document.getElementById("heartCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const colors = ["#ff69b4", "#ff1493", "#ff66cc", "#ff85c1", "#ffb6c1", "#e92f8d"];

    // Разные функции для рисования сердец (формы)
    function drawHeartStyle1(x, y, size, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(size / 20, size / 20);

      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(5, -10, 15, -10, 20, 0);
      ctx.bezierCurveTo(15, 10, 5, 20, 0, 30);
      ctx.bezierCurveTo(-5, 20, -15, 10, -20, 0);
      ctx.bezierCurveTo(-15, -10, -5, -10, 0, 0);
      ctx.fillStyle = color;
      ctx.fill();

      ctx.restore();
    }

    function drawHeartStyle2(x, y, size, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(size / 20, size / 20);
      ctx.rotate((Math.random() * 30 - 15) * Math.PI / 180);

      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(5, -15, 15, -15, 20, 0);
      ctx.bezierCurveTo(15, 15, 5, 25, 0, 35);
      ctx.bezierCurveTo(-5, 25, -15, 15, -20, 0);
      ctx.bezierCurveTo(-15, -15, -5, -15, 0, 0);
      ctx.fillStyle = color;
      ctx.shadowColor = "#000";
      ctx.shadowBlur = 5;
      ctx.fill();

      ctx.restore();
    }

    function drawHeartStyle3(x, y, size, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(size / 20, size / 20);
      ctx.rotate((Math.random() * 30 - 15) * Math.PI / 180);

      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(7, -10, 13, -10, 20, 0);
      ctx.bezierCurveTo(13, 15, 7, 25, 0, 35);
      ctx.bezierCurveTo(-7, 25, -13, 15, -20, 0);
      ctx.bezierCurveTo(-13, -10, -7, -10, 0, 0);
      const gradient = ctx.createLinearGradient(-10, -10, 10, 10);
      gradient.addColorStop(0, color);
      gradient.addColorStop(1, "#fff");
      ctx.fillStyle = gradient;
      ctx.fill();

      ctx.restore();
    }

    const heartStyles = [drawHeartStyle1, drawHeartStyle2, drawHeartStyle3];

    function createHeart() {
      const x = Math.random() * canvas.width;
      const y = Math.random() * canvas.height;
      const size = Math.random() * 30 + 10;
      const style = heartStyles[Math.floor(Math.random() * heartStyles.length)];
      const color = colors[Math.floor(Math.random() * colors.length)];

      style(x, y, size, color);
    }

    // Очистка экрана каждые 6 секунд
    setInterval(() => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }, 6000);

    // Рисовать новые сердца
    setInterval(() => {
      createHeart();
    }, 200); // новое сердце каждые 200 мс

    // Адаптация под размер окна
    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
